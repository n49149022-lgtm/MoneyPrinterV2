name:  Full Vertical Video (Stocks + Voice + Subtitles)

on:
  workflow_dispatch:
    inputs:
      topic:
        description: 'Topic for video'
        required: true
        default: '20 local AI agents free 48 hours'
      voice:
        description: 'Voice'
        required: true
        default: 'ru-RU-DmitryNeural'
        type: choice
        options:
          - ru-RU-DmitryNeural
          - ru-RU-SvetlanaNeural
          - en-US-JennyNeural

jobs:
  create-full-video:
    runs-on: ubuntu-latest
    steps:
      - name: 📦 Checkout
        uses: actions/checkout@v4

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: ⬇️ Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg imagemagick
          pip install requests "moviepy==1.0.3" edge-tts Pillow

      - name: 🎬 Generate full video
        env:
          PEXELS_KEY: ${{ secrets.PEXELS_API_KEY }}
          TOPIC: ${{ github.event.inputs.topic }}
          VOICE: ${{ github.event.inputs.voice }}
        run: |
          python - << 'PYTHON_SCRIPT'
          import requests, os, asyncio, re
          from moviepy.editor import VideoFileClip, AudioFileClip, TextClip, CompositeVideoClip, concatenate_videoclips
          import edge_tts

          TOPIC = os.environ['TOPIC']
          VOICE = os.environ['VOICE']
          PEXELS_KEY = os.environ['PEXELS_KEY']

          # 1. Script
          script = f"{TOPIC}. No internet required. Zero RAM when idle. Complete privacy. Free for 48 hours. Get it now."

          # 2. TTS
          async def gen_audio(text, voice, out):
              comm = edge_tts.Communicate(text, voice)
              await comm.save(out)
          asyncio.run(gen_audio(script, VOICE, 'voiceover.mp3'))

          # 3. Pexels
          headers = {'Authorization': PEXELS_KEY}
          url = f"https://api.pexels.com/videos/search?query={TOPIC.replace(' ', '+')}&per_page=5&orientation=portrait"
          vids = requests.get(url, headers=headers).json().get('videos', [])
          os.makedirs('clips', exist_ok=True)
          clip_paths = []
          for i, v in enumerate(vids[:4]):
              p = f"clips/clip_{i}.mp4"
              with open(p, 'wb') as f: f.write(requests.get(v['video_files'][0]['link']).content)
              clip_paths.append(p)

          # 4. Audio duration
          audio = AudioFileClip('voiceover.mp3')
          dur = audio.duration

          # 5. Process clips to 9:16
          processed = []
          for cp in clip_paths:
              c = VideoFileClip(cp)
              ratio = 9/16
              if c.w/c.h > ratio:
                  nw = int(c.h * ratio)
                  c = c.crop(x1=(c.w-nw)//2, width=nw)
              else:
                  nh = int(c.w / ratio)
                  c = c.crop(y1=(c.h-nh)//2, height=nh)
              c = c.resize(height=1920)
              processed.append(c)

          # 6. Loop clips to match audio
          from itertools import cycle
          final_clips = []
          t = 0
          for clip in cycle(processed):
              if t >= dur: break
              d = min(clip.duration, dur - t)
              final_clips.append(clip.subclip(0, d))
              t += d

          video = concatenate_videoclips(final_clips).set_audio(audio)

          # 7. Subtitles
          lines = [l.strip() for l in re.split(r'[.!?]', script) if l.strip()]
          line_dur = dur / len(lines) if lines else 3
          subs = []
          for i, line in enumerate(lines):
              txt = TextClip(line, fontsize=40, color='white', font='Arial-Bold', stroke_color='black', stroke_width=2, size=(900, None), method='caption')
              txt = txt.set_pos(('center', 1600)).set_start(i * line_dur).set_duration(line_dur)
              subs.append(txt)

          final = CompositeVideoClip([video] + subs)
          os.makedirs('output', exist_ok=True)
          final.write_videofile('output/final_video.mp4', codec='libx264', audio_codec='aac', fps=30)
          print('✅ Done: output/final_video.mp4')
          PYTHON_SCRIPT

      - name: 📤 Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: full-video
          path: output/final_video.mp4
          retention-days: 7
