name: 🎬 Full Vertical Video (RU Female Voice + Stocks) - CUSTOM TEXT

on:
  workflow_dispatch:
    inputs:
      topic:
        description: 'Тема для поиска стоков'
        required: true
        default: 'AI technology'
      script:
        description: 'Текст озвучки (на русском)'
        required: true
        default: '20 локальных ИИ-агентов бесплатно. Они работают только на твоём компьютере. Без интернета. Без облаков. Без слежки. Ноль оперативной памяти в покое. Пока не нужны — спят в файле. Запустил — выполнил задачу — сохранил результат — и снова тишина. Я выложила стартовый набор. Двадцать готовых агентов. Просто распакуй и проверь. Архив бесплатный, но доступ открыт ровно на сорок восемь часов. Потом закрою. Ссылка: бусти точка то слэш исследователь. Подпишись на канал.'
      voice:
        description: 'Голос'
        required: false
        default: 'ru-RU-SvetlanaNeural'
        type: choice
        options:
          - ru-RU-SvetlanaNeural
          - ru-RU-DmitryNeural

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  create-full-video:
    runs-on: ubuntu-latest
    steps:
      - name: 📦 Checkout
        uses: actions/checkout@v5

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: ⬇️ Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg
          pip install requests "moviepy==1.0.3" "Pillow==9.5.0" edge-tts

      - name: 🎬 Generate video (Custom script + voice)
        env:
          PEXELS_KEY: ${{ secrets.PEXELS_API_KEY }}
          TOPIC: ${{ github.event.inputs.topic }}
          SCRIPT: ${{ github.event.inputs.script }}
          VOICE: ${{ github.event.inputs.voice }}
        run: |
          python - << 'PYTHON_SCRIPT'
          import requests, os, asyncio
          from moviepy.editor import VideoFileClip, AudioFileClip, concatenate_videoclips
          import edge_tts

          TOPIC = os.environ['TOPIC']
          SCRIPT = os.environ['SCRIPT']
          VOICE = os.environ['VOICE']
          PEXELS_KEY = os.environ['PEXELS_KEY']

          # 1. Use custom script from input
          script = SCRIPT

          # 2. Generate TTS
          async def gen_audio(text, voice, out):
              comm = edge_tts.Communicate(text, voice)
              await comm.save(out)
          
          asyncio.run(gen_audio(script, VOICE, 'voiceover.mp3'))
          print(f"🔊 Generated audio with voice: {VOICE}")

          # 3. Fetch stock videos
          headers = {'Authorization': PEXELS_KEY}
          url = f"https://api.pexels.com/videos/search?query={TOPIC.replace(' ', '+')}&per_page=8&orientation=portrait"
          vids = requests.get(url, headers=headers).json().get('videos', [])
          
          os.makedirs('clips', exist_ok=True)
          clip_paths = []
          for i, v in enumerate(vids[:6]):
              p = f"clips/clip_{i}.mp4"
              with open(p, 'wb') as f:
                  f.write(requests.get(v['video_files'][0]['link']).content)
              clip_paths.append(p)
          print(f"🎬 Downloaded {len(clip_paths)} stock clips")

          # 4. Load audio
          audio = AudioFileClip('voiceover.mp3')
          dur = audio.duration
          print(f"⏱️ Audio duration: {dur:.2f} seconds")

          # 5. Process clips to 9:16
          processed = []
          for cp in clip_paths:
              c = VideoFileClip(cp)
              target_w, target_h = 1080, 1920
              ratio = target_w / target_h
              if c.w / c.h > ratio:
                  new_w = int(c.h * ratio)
                  c = c.crop(x1=(c.w - new_w)//2, width=new_w, height=c.h)
              else:
                  new_h = int(c.w / ratio)
                  c = c.crop(y1=(c.h - new_h)//2, width=c.w, height=new_h)
              c = c.resize((target_w, target_h))
              processed.append(c)

          # 6. Loop clips to match audio
          from itertools import cycle
          final_clips = []
          t = 0
          for clip in cycle(processed):
              if t >= dur: break
              d = min(clip.duration, dur - t)
              final_clips.append(clip.subclip(0, d))
              t += d

          video = concatenate_videoclips(final_clips).set_audio(audio)

          # 7. Export
          os.makedirs('output', exist_ok=True)
          video.write_videofile('output/final_video.mp4', codec='libx264', audio_codec='aac', fps=30, logger=None)
          print(f'✅ Done: output/final_video.mp4 ({dur:.2f} seconds)')
          PYTHON_SCRIPT

      - name: 📤 Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: full-video
          path: output/final_video.mp4
          retention-days: 7
