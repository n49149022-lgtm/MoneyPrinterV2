name: 🎬 Full Vertical Video (Stocks + Voice) - 45 SEC

on:
  workflow_dispatch:
    inputs:
      topic:
        description: 'Topic for video'
        required: true
        default: '20 local AI agents free 48 hours'
      voice:
        description: 'Voice'
        required: true
        default: 'ru-RU-DmitryNeural'
        type: choice
        options:
          - ru-RU-DmitryNeural
          - ru-RU-SvetlanaNeural
          - en-US-JennyNeural

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  create-full-video:
    runs-on: ubuntu-latest
    steps:
      - name: 📦 Checkout
        uses: actions/checkout@v5

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: ⬇️ Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg
          pip install requests "moviepy==1.0.3" "Pillow==9.5.0" edge-tts

      - name: 🎬 Generate video (45 sec, Stocks + Voice)
        env:
          PEXELS_KEY: ${{ secrets.PEXELS_API_KEY }}
          TOPIC: ${{ github.event.inputs.topic }}
          VOICE: ${{ github.event.inputs.voice }}
        run: |
          python - << 'PYTHON_SCRIPT'
          import requests, os, asyncio
          from moviepy.editor import VideoFileClip, AudioFileClip, concatenate_videoclips
          import edge_tts

          TOPIC = os.environ['TOPIC']
          VOICE = os.environ['VOICE']
          PEXELS_KEY = os.environ['PEXELS_KEY']

          # 1. FULL SCRIPT (~45 seconds, ~90 words)
          script = f"""{TOPIC}. 
          They work only on your computer. No internet required. 
          No cloud. No tracking. Zero RAM when idle. 
          They sleep in a file. Wake up on command. 
          Do the task. Save the result. Go back to sleep. 
          I released a starter pack. Twenty ready-made agents. 
          Just unpack and test on your data. 
          The archive is free, but access is open for exactly forty-eight hours. 
          Then I will close it. 
          Link: boosty.to/researcher. 
          Subscribe to the channel. Next, I will show how the system learns from your feedback."""

          # 2. Generate TTS
          async def gen_audio(text, voice, out):
              comm = edge_tts.Communicate(text, voice)
              await comm.save(out)
          asyncio.run(gen_audio(script, VOICE, 'voiceover.mp3'))

          # 3. Fetch stock videos from Pexels
          headers = {'Authorization': PEXELS_KEY}
          url = f"https://api.pexels.com/videos/search?query={TOPIC.replace(' ', '+')}&per_page=8&orientation=portrait"
          vids = requests.get(url, headers=headers).json().get('videos', [])
          
          os.makedirs('clips', exist_ok=True)
          clip_paths = []
          for i, v in enumerate(vids[:6]):  # Берём больше клипов для разнообразия
              p = f"clips/clip_{i}.mp4"
              with open(p, 'wb') as f:
                  f.write(requests.get(v['video_files'][0]['link']).content)
              clip_paths.append(p)

          # 4. Load audio and get duration
          audio = AudioFileClip('voiceover.mp3')
          dur = audio.duration
          print(f"🔊 Audio duration: {dur:.2f} seconds")

          # 5. Process clips: crop + resize to 9:16 (1080x1920)
          processed = []
          for cp in clip_paths:
              c = VideoFileClip(cp)
              target_w, target_h = 1080, 1920
              ratio = target_w / target_h
              if c.w / c.h > ratio:
                  new_w = int(c.h * ratio)
                  c = c.crop(x1=(c.w - new_w)//2, width=new_w, height=c.h)
              else:
                  new_h = int(c.w / ratio)
                  c = c.crop(y1=(c.h - new_h)//2, width=c.w, height=new_h)
              c = c.resize((target_w, target_h))
              processed.append(c)

          # 6. Loop clips to match FULL audio duration
          from itertools import cycle
          final_clips = []
          t = 0
          for clip in cycle(processed):
              if t >= dur: 
                  break
              # Берём кусок клипа или весь клип, если он короткий
              available = min(clip.duration, dur - t)
              final_clips.append(clip.subclip(0, available))
              t += available
              print(f"⏱️ Added clip, total: {t:.2f}/{dur:.2f}s")

          video = concatenate_videoclips(final_clips).set_audio(audio)

          # 7. Export
          os.makedirs('output', exist_ok=True)
          video.write_videofile('output/final_video.mp4', codec='libx264', audio_codec='aac', fps=30, logger=None)
          print(f'✅ Done: output/final_video.mp4 ({dur:.2f} seconds)')
          PYTHON_SCRIPT

      - name: 📤 Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: full-video
          path: output/final_video.mp4
          retention-days: 7
