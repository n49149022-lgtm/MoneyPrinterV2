name: Сделать обзор товара
on:
  workflow_dispatch:
    inputs:
      product_name:
        description: 'Название товара'
        required: true
      review_text:
        description: 'Текст обзора (2-3 предложения)'
        required: true
      photo_url:
        description: 'Ссылка на фото товара'
        required: true

jobs:
  make_review:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Установить FFmpeg и библиотеки
        run: |
          sudo apt update && sudo apt install -y ffmpeg
          pip install moviepy gtts pillow

      - name: Скачать фото и сгенерировать видео
        run: |
          python - <<EOF
          import urllib.request
          from PIL import Image
          from moviepy import *
          from gtts import gTTS
          import numpy as np

          # Скачать фото
          urllib.request.urlretrieve("${{ github.event.inputs.photo_url }}", "photo.jpg")

          # Конвертировать фото в формат, понятный moviepy
          img = Image.open("photo.jpg")
          img = img.convert("RGB")
          img.save("photo_converted.jpg")

          # Сделать озвучку
          tts = gTTS("${{ github.event.inputs.review_text }}", lang='ru')
          tts.save("voice.mp3")

          # Создать вертикальное видео
          clip = ImageClip("photo_converted.jpg").resized(height=1920).with_duration(30)
          audio_clip = AudioFileClip("voice.mp3").with_duration(clip.duration)

          # Добавить название товара
          txt = TextClip(
              text="${{ github.event.inputs.product_name }}",
              font_size=70,
              color='white',
              font='/usr/share/fonts/truetype/liberation/LiberationSans-Regular.ttf'
          ).with_duration(30).with_position(('center', 'center'))

          # Склеить и сохранить
          final = CompositeVideoClip([clip, txt]).with_audio(audio_clip)
          final.write_videofile("review.mp4", fps=24)
          EOF

      - name: Загрузить видео
        uses: actions/upload-artifact@v4
        with:
          name: product-review
          path: review.mp4
